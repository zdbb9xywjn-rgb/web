<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <title>Benjamin Pichler</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  color: white;

  background: linear-gradient(142deg, #8b538d, #4d86be);
  background-size: 200% 200%;

  animation: gradientShift 18s ease-in-out infinite;
}

@keyframes gradientShift {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

    /* Container */
    .content {
  backdrop-filter: blur(12px);
  background: rgba(255,255,255,0.08);
  padding: 60px 40px 40px 40px; /* ↑ oben mehr */
  border-radius: 20px;
  animation: fadeIn 1.2s ease forwards;
}

    /* Logo */
    img {
      width: 400px;
      max-width: 80%;
      margin-bottom: 40px;

      animation: fadeUp 1.2s ease;
    }

    h1, p {
      font-size: 18px;
      margin: 6px 0;
      font-weight: normal;

      text-transform: uppercase; /* ALL CAPS */
      letter-spacing: 1px;

      opacity: 0;
      animation: fadeUp 1s ease forwards;
    }

    /* leichte Staffelung für nicer Effekt */
    h1 { animation-delay: 0.3s; }
    p:nth-of-type(1) { animation-delay: 0.5s; }
    p:nth-of-type(2) { animation-delay: 0.7s; }

    a {
      color: white;
      text-decoration: none;
    }

    a:hover {
      opacity: 0.7;
      transition: 0.2s;
    }

    /* Animationen */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <div class="content">
    <img src="logo-white.png" alt="Logo">

    <h1>Benjamin Pichler</h1>

    <p>
      <a href="tel:+436509980900">
        +43 650 9980900
      </a>
    </p>
    
    <p>
      <a href="mailto:benjamin@pichler-digital.at">
        benjamin@pichler-digital.at
      </a>
    </p>

  </div>

</body>
</html>
