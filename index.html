<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title>Benjamin Pichler</title>

  <meta name="theme-color" content="#7c69a8">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png">
  <!-- Apple Touch Icon -->
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    /* Hintergrund auch auf html legen */
    html {
      background: linear-gradient(142deg, #8b538d, #4d86be);
      background-size: 200% 200%;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
      color: white;

      background: linear-gradient(142deg, #8b538d, #4d86be);
      background-size: 200% 200%;
      animation: gradientShift 16s ease-in-out infinite;

      /* WICHTIG für iPhone / Safari */
      min-height: 100svh;
      min-height: 100dvh;
      min-height: -webkit-fill-available;

      /* Safe Areas für Notch / Home Bar */
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);

      overflow: hidden;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Container */
    .content {
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: rgba(255,255,255,0.08);
      padding: 60px 40px 40px 40px;
      border-radius: 20px;
      animation: fadeIn 2.0s ease forwards;

      /* auf kleinen Screens etwas luftiger */
      margin: 20px;
      width: min(90vw, 560px);
      box-sizing: border-box;
    }

    /* Logo */
    img {
      width: min(400px, 80%);
      margin-bottom: 40px;
      animation: fadeUp 1.2s ease;
    }

    h1, p {
      margin: 6px 0;
      font-weight: normal;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0;
      animation: fadeUp 1s ease forwards;

      /* statt fixer 18px -> responsive */
      font-size: clamp(18px, 2.2vw, 18px);
    }

    h1 { animation-delay: 0.3s; }
    p:nth-of-type(1) { animation-delay: 0.5s; }
    p:nth-of-type(2) { animation-delay: 0.7s; }

    a {
      color: white;
      text-decoration: none;
    }

    a:hover {
      opacity: 0.7;
      transition: 0.2s;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Mobile Feintuning */
    @media (max-width: 768px) {
      .content {
        margin: 0;
        padding: 40px 20px;
        border-radius: 0;
        width: 100%;
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
        background: transparent;
      }

      h1, p {
        font-size: clamp(18px, 4.2vw, 20px);
        letter-spacing: 0.8px;
      }

      img {
        margin-bottom: 28px;
      }
    }
  </style>
</head>

<body>
  <div class="content">
    <img src="logo-white.png" alt="Logo">

    <h1>Benjamin Pichler</h1>

    <p>
      <a href="tel:+436509980900">
        +43 650 9980900
      </a>
    </p>
    
    <p>
      <a href="mailto:benjamin@pichler-digital.at">
        benjamin@pichler-digital.at
      </a>
    </p>
  </div>
</body>
</html>
